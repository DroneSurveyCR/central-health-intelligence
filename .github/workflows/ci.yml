name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run e2e tests
        run: npx playwright test --reporter=github
        env:
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL || 'https://healthsync-cloud-mu.vercel.app' }}
