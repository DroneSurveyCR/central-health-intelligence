version: 2
updates:
  # npm dependencies — weekly, grouped, so a healthcare dependency tree stays
  # ahead of CVEs without a flood of single-package PRs.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      production-deps:
        dependency-type: production
      dev-deps:
        dependency-type: development
  # Keep GitHub Actions pinned + current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
